<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">KEM Ý SƯƠNG</title>
  <desc id="desc">Hình minh họa kem cho mạng xã hội.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff2dc"/>
      <stop offset="100%" stop-color="#ffe3bf"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="970" cy="120" r="90" fill="#ffd6a3" opacity="0.6"/>
  <circle cx="140" cy="520" r="120" fill="#ffd6a3" opacity="0.5"/>
  <text x="100" y="255" font-family="Georgia, serif" font-size="82" fill="#9a3412" font-weight="700">KEM Ý SƯƠNG</text>
  <text x="100" y="320" font-family="Arial, sans-serif" font-size="36" fill="#7c2d12">Kem tươi thủ công, mát lành mỗi ngày.</text>
  <g transform="translate(900 330)">
    <rect x="-70" y="70" width="140" height="180" rx="16" fill="#c2410c"/>
    <circle cx="0" cy="60" r="72" fill="#7c2d12"/>
    <circle cx="-58" cy="30" r="58" fill="#f8b4b4"/>
    <circle cx="58" cy="30" r="58" fill="#fde68a"/>
  </g>
</svg>
